window.criarJ=cid=>{
  const pid=Date.now();const p2=Date.now()+1;
  S.procs=S.procs.filter(p=>p.cid!==cid);
  S.ativs=S.ativs.filter(a=>a.cid!==cid);
  S.procs.push({id:pid,cid,sess:8,sdon:0,ets:[false,false,false,false]});
  initJornada(pid,cid,S.clients.find(cl=>cl.id===cid)?.mod||'completa');sv();R();

window.tLock=async(pid,ei)=>{
  S.procs=S.procs.map(p=>{if(p.id!==pid)return p;const e=[...p.ets];e[ei]=!e[ei];return{...p,ets:e};});
  const proc=S.procs.find(p=>p.id===pid);
  if(proc&&proc.ets.some(Boolean)){
    S.clients=S.clients.map(cl=>cl.id===proc.cid?{...cl,jornBloq:false}:cl);
  }
  sv('procs').then(()=>R());
};

window.tSess=async(pid,i)=>{
  S.procs=S.procs.map(p=>{if(p.id!==pid)return p;return{...p,sdon:i<p.sdon?i:i+1};});await sv();R();
};

window.saveCli=function(){
  try{
    const n=document.getElementById('cn').value.trim();
    if(!n){alert('Nome obrigatÃ³rio');return;}
    const codeEl=document.getElementById('ccode');
    const modEl=document.getElementById('cmod');
    const code=(codeEl&&codeEl.value.trim())||n.split(' ')[0].toLowerCase()+'2024';
    const mod=(modEl&&modEl.value)||'completa';
    const etsInit=[false,false,false,false];
    const id=Date.now();
    const pid=id+1;
    const sess=parseInt((document.getElementById('cs')||{value:'8'}).value)||8;
    const sdon=parseInt((document.getElementById('cd')||{value:'0'}).value)||0;
    S.clients.push({id,n,ini:ini(n),mod,code,jornBloq:true});
    S.procs.push({id:pid,cid:id,sess,sdon,ets:etsInit});
    initJornada(pid,id,mod);
    S.modal=null;
    S.curCli=S.clients.length-1;
    sv();R();
  }catch(e){
    console.error('saveCli erro:',e);
    alert('Erro ao criar mentorada: '+e.message);
  }
};

window.saveAtiv=async()=>{
  const t=document.getElementById('at2').value.trim();if(!t){alert('TÃ­tulo obrigatÃ³rio');return;}
  const cli=S.clients[S.curCli];const proc=gProc(cli.id);if(!proc)return;
  S.ativs.push({id:Date.now()+Math.floor(Math.random()*1000),pid:proc.id,cid:cli.id,e:S.addEt,ti:t,de:document.getElementById('ad2').value.trim(),pi:document.getElementById('ap2').value,pr:document.getElementById('apr2').value,st:'pending',res:'',fb:''});
  S.addEt=null;sv();R();
};

  const t=document.getElementById('st2').value.trim();
  S.ativs=S.ativs.map(a=>a.id===id?{...a,st:'submitted',res:t}:a);
  S.subId=null;sv();R();
};

window.doFb=id=>{
  const fb=document.getElementById('ft2').value.trim();const st=document.getElementById('fs2').value;
  S.ativs=S.ativs.map(a=>a.id===id?{...a,fb,st}:a);
  S.fbId=null;sv();R();
};

window.dAtiv=id=>{if(confirm('Excluir atividade?')){S.ativs=S.ativs.filter(a=>a.id!==id);sv();R();}};
window.liberarJornada=async function(id){
  S.clients=S.clients.map(cl=>cl.id===id?{...cl,jornBloq:false}:cl);
  // Libera automaticamente a primeira fase da modalidade
  const cli=S.clients.find(cl=>cl.id===id);
  const proc=cli?gProc(cli.id):null;
  if(proc){
    const fases=getFasesVisiveis(cli);
    if(fases.length>0){
      const e=[...proc.ets];
      e[fases[0]]=true;
      S.procs=S.procs.map(p=>p.id===proc.id?{...p,ets:e}:p);
    }
  }
  sv();R();
};
window.dCli=async id=>{if(confirm('Excluir mentorada e toda a jornada?')){
  // Deletar do Supabase
  const proc=S.procs.find(p=>p.cid===id);
  if(proc){
    const ativIds=S.ativs.filter(a=>a.cid===id).map(a=>a.id);
    for(const aid of ativIds) await sbDel('rxr_ativs',aid);
    await sbDel('rxr_procs',proc.id);
  }
  const diagIds=S.diags.filter(d=>d.cid===id).map(d=>d.id);
  for(const did of diagIds) await sbDel('rxr_diags',did);
  await sbDel('rxr_clients',id);
  // Atualizar estado local
  S.clients=S.clients.filter(c=>c.id!==id);
  S.procs=S.procs.filter(p=>p.cid!==id);
  S.ativs=S.ativs.filter(a=>a.cid!==id);
  S.diags=S.diags.filter(d=>d.cid!==id);
  if(S.curCli>=S.clients.length)S.curCli=0;
  R();
}};
