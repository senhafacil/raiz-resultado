<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raiz × Resultado · Vanessa de Oliveira</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --nv:#1C1F5A;--nv2:#2D3180;--nvf:#EEEEF9;
  --pu:#7B2F8A;--puf:#F5EEF8;
  --go:#9A6C00;--gof:#FDF7E8;
  --gr:#1A6B40;--grf:#EAF5EE;
  --rd:#9B2020;--rdf:#FCEAEA;
  --bg:#F4F4F9;--sf:#FFF;--sf2:#F0F0F8;
  --bd:rgba(28,31,90,.09);--bd2:rgba(28,31,90,.15);
  --tx:#1C1F5A;--tx2:#565888;--tx3:#9898BB;
  --r:12px;--rs:8px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding-bottom:60px}

/* HDR */
.hdr{background:var(--nv);display:flex;align-items:center;justify-content:space-between;padding:13px 24px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(28,31,90,.2)}
.ln{color:#fff;font-size:15px;font-weight:800}.lt{color:rgba(255,255,255,.4);font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;margin-top:1px}
.ops{display:flex;gap:3px}
.op{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.04em}
.o1{background:rgba(100,110,255,.25);color:#C0C4FF}
.o2{background:rgba(180,80,220,.25);color:#E0A8F8}
.o3{background:rgba(200,160,40,.25);color:#F5D880}
.rsw{display:flex;gap:2px;background:rgba(255,255,255,.08);border-radius:7px;padding:3px}
.rb{padding:5px 14px;border-radius:5px;border:none;background:transparent;font-size:11px;font-weight:700;cursor:pointer;color:rgba(255,255,255,.45);font-family:inherit;transition:all .15s}
.rb.on{background:rgba(255,255,255,.18);color:#fff}

/* LAYOUT */
.ct{padding:20px 24px}
.row{display:flex;align-items:center;gap:8px}
.rwb{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.f1{flex:1;min-width:0}

/* TABS */
.tabs{display:flex;border-bottom:.5px solid var(--bd2);padding:0 24px;background:var(--sf)}
.tab{padding:11px 14px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--tx3);border:none;background:transparent;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-.5px;font-family:inherit;transition:all .15s}
.tab.on{color:var(--nv);border-bottom-color:var(--nv)}

/* ETAPAS NAV */
.enav{display:grid;grid-template-columns:repeat(4,1fr);background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--r) var(--r) 0 0;border-bottom:none}
.et{padding:11px 8px;text-align:center;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s;border-right:.5px solid var(--bd)}
.et:last-child{border-right:none}
.et.on{border-bottom-color:var(--nv2);background:var(--nvf)}
.etnum{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;margin:0 auto 3px}
.n1{background:var(--nvf);color:var(--nv2)}.n2{background:var(--puf);color:var(--pu)}.n3{background:var(--gof);color:var(--go)}.n4{background:var(--grf);color:var(--gr)}
.etname{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--tx3)}
.et.on .etname{color:var(--nv2)}
.etpct{font-size:9px;color:var(--tx3);margin-top:2px}

/* ETAPA DETAIL */
.etdet{background:var(--sf);border:.5px solid var(--bd2);border-top:none;border-radius:0 0 var(--r) var(--r);padding:16px 20px;margin-bottom:10px}

/* CARDS */
.card{background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--r);padding:16px 20px;margin-bottom:8px}

/* ACTIVITY */
.ac{background:var(--sf);border:.5px solid var(--bd);border-radius:var(--rs);padding:13px 16px;margin-bottom:7px;transition:border-color .15s}
.ac:hover{border-color:var(--bd2)}
.at{font-size:13px;font-weight:700}
.ad{font-size:12px;color:var(--tx2);margin-top:3px;line-height:1.45}
.am{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.rep{background:var(--grf);border:.5px solid rgba(26,107,64,.15);border-radius:6px;padding:8px 11px;margin-top:8px;font-size:12px;color:var(--gr);line-height:1.45}
.fb2{background:var(--nvf);border:.5px solid rgba(44,49,128,.12);border-radius:6px;padding:8px 11px;margin-top:5px;font-size:12px;color:var(--nv2);line-height:1.45}

/* BADGES */
.b{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap}
.bg2{background:var(--sf2);color:var(--tx2)}.bgr{background:var(--grf);color:var(--gr)}.bnv{background:var(--nvf);color:var(--nv2)}.bpu{background:var(--puf);color:var(--pu)}.bgo{background:var(--gof);color:var(--go)}.brd{background:var(--rdf);color:var(--rd)}
.ptO{background:var(--nvf);color:var(--nv2)}.ptR{background:var(--puf);color:var(--pu)}.ptA{background:var(--gof);color:var(--go)}
.pt{display:inline-flex;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:800}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--rs);border:.5px solid var(--bd2);background:var(--sf);font-size:12px;font-weight:700;cursor:pointer;color:var(--tx);font-family:inherit;transition:all .15s}
.btn:hover{background:var(--sf2)}
.bnav{background:var(--nv);color:#fff;border-color:var(--nv)}.bnav:hover{background:var(--nv2)}
.bgrn{background:var(--gr);color:#fff;border-color:var(--gr)}.bgrn:hover{opacity:.9}
.bsm{padding:5px 10px;font-size:11px}
.bgh{border:none;background:transparent;padding:4px;cursor:pointer;border-radius:4px;font-family:inherit;font-size:12px}
.bgh:hover{background:var(--sf2)}
.lbtn{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--rs);border:1.5px solid;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.llk{background:var(--sf2);border-color:var(--bd2);color:var(--tx3)}.llk:hover{border-color:var(--gr);color:var(--gr);background:var(--grf)}
.lok{background:var(--grf);border-color:var(--gr);color:var(--gr)}.lok:hover{background:var(--rdf);border-color:var(--rd);color:var(--rd)}

/* FORM */
.fg{margin-bottom:12px}
.fl{display:block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);margin-bottom:4px}
input,textarea,select{width:100%;padding:8px 12px;border:.5px solid var(--bd2);border-radius:var(--rs);font-size:13px;font-family:inherit;color:var(--tx);background:var(--sf);outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--nv2)}
textarea{resize:vertical;min-height:75px;line-height:1.5}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(20,22,70,.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--sf);border-radius:16px;padding:24px;width:100%;max-width:490px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(28,31,90,.2)}
.mtt{font-size:16px;font-weight:800;margin-bottom:16px;color:var(--nv)}

/* PROGRESS */
.pb{height:5px;background:var(--sf2);border-radius:999px;overflow:hidden}
.pf{height:100%;border-radius:999px;background:var(--nv2);transition:width .4s}
.pbg{height:7px;background:var(--sf2);border-radius:999px;overflow:hidden}

/* SESSIONS */
.sdots{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.sd{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;cursor:pointer;transition:all .15s;user-select:none}
.sdon{background:var(--nv2);color:#fff}.stod{background:var(--sf2);color:var(--tx3);border:.5px solid var(--bd2)}
.sd:hover{transform:scale(1.1)}

/* AV */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
.av0{background:var(--nvf);color:var(--nv2)}.av1{background:var(--puf);color:var(--pu)}.av2{background:var(--gof);color:var(--go)}.av3{background:var(--grf);color:var(--gr)}

/* STATS */
.st3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stc{background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--rs);padding:12px 14px;text-align:center}
.stn{font-size:22px;font-weight:800}
.stl{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-top:2px}

/* CLIENT STAGE */
.cstage{background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.csh{padding:14px 18px;display:flex;align-items:center;gap:12px}
.csb{padding:2px 18px 16px}
.lock-msg{padding:14px 18px;text-align:center;color:var(--tx3);font-size:12px;font-style:italic;border-top:.5px solid var(--bd)}

.div{border:none;border-top:.5px solid var(--bd);margin:10px 0}
.empty{text-align:center;padding:36px 20px;color:var(--tx3);font-size:13px}
.info-box{background:var(--nvf);border-radius:var(--rs);padding:10px 13px;font-size:12px;color:var(--nv2);line-height:1.5;margin-bottom:12px}

/* PLANO DE AÇÃO */
.plano-fase-hdr{border-radius:var(--r) var(--r) 0 0;padding:13px 17px;display:flex;align-items:center;gap:11px}
.plano-fase-num{font-size:20px;font-weight:800;color:rgba(255,255,255,.4);line-height:1;flex-shrink:0}
.plano-fase-tit{font-size:11px;font-weight:700;color:white;line-height:1.3}
.plano-fase-pz{font-size:9px;color:rgba(255,255,255,.55);margin-top:2px}
.plano-fase-intro{padding:9px 17px;font-size:11px;line-height:1.5;font-style:italic}
.plano-fase-body{background:var(--sf);padding:4px 0}
.plano-acao{display:flex;gap:10px;padding:9px 17px}
.plano-acao+.plano-acao{border-top:.3px solid var(--bd)}
.plano-acao-num{width:18px;height:18px;border-radius:50%;color:white;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.plano-acao-tit{font-size:12px;font-weight:700;color:var(--nv);margin-bottom:2px}
.plano-acao-desc{font-size:11px;color:var(--tx2);line-height:1.45}
.plano-card3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.plano-mini{border-radius:var(--rs);padding:11px}
.plano-mini-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.plano-mini-txt{font-size:11px;color:var(--tx2);line-height:1.4}
.plano-alerta{border-radius:var(--rs);padding:13px 15px;margin-bottom:10px}
.plano-alerta-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--rd);margin-bottom:5px}
.plano-alerta-txt{font-size:12px;color:#5C1010;line-height:1.5}
.plano-diag{background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--r);padding:14px 17px;margin-bottom:10px}
.plano-status-ok{display:inline-flex;align-items:center;gap:5px;background:var(--grf);color:var(--gr);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700}
.plano-status-rascunho{display:inline-flex;align-items:center;gap:5px;background:var(--gof);color:var(--go);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700}

/* CRONOGRAMA */
.cron-semana{background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.cron-hdr{padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s}
.cron-hdr:hover{background:var(--sf2)}
.cron-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.cron-titulo{font-size:13px;font-weight:700;color:var(--nv)}
.cron-sub{font-size:11px;color:var(--tx3);margin-top:1px}
.cron-body{padding:4px 16px 12px}
.cron-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:.3px solid var(--bd)}
.cron-item:last-child{border-bottom:none}
.cron-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--bd2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.cron-check.done{background:var(--gr);border-color:var(--gr)}
.cron-txt{font-size:12px;color:var(--tx2);flex:1;line-height:1.4;padding-top:1px}
.cron-txt.done{text-decoration:line-through;color:var(--tx3)}
.cron-nota{font-size:11px;color:var(--tx3);font-style:italic;margin-top:3px}
.cron-pbar{height:4px;background:var(--sf2);border-radius:99px;overflow:hidden;margin-top:6px}
.cron-pfill{height:100%;border-radius:99px;transition:width .4s}
@media(max-width:600px){.plano-card3{grid-template-columns:1fr}}

/* CRONOGRAMA DIA A DIA */
.cron-dia-hdr{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);padding:8px 0 4px;margin-top:8px;border-top:.3px solid var(--bd);display:flex;align-items:center;gap:6px}
.cron-dia-hdr:first-child{border-top:none;margin-top:0}
.cron-dia-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.como-fazer-btn{display:inline-flex;align-items:center;gap:4px;margin-top:5px;padding:3px 8px;background:var(--sf2);border:none;border-radius:4px;font-size:10px;font-weight:700;color:var(--tx2);cursor:pointer;font-family:inherit;transition:all .15s}
.como-fazer-btn:hover{background:var(--bd2)}
.como-fazer-box{background:var(--sf2);border-radius:6px;padding:10px 12px;margin-top:6px;font-size:11px;color:var(--tx2);line-height:1.6;border-left:2px solid var(--bd2)}
.como-fazer-passo{display:flex;gap:8px;margin-bottom:5px;align-items:flex-start}
.como-fazer-passo:last-child{margin-bottom:0}
.cf-num{width:16px;height:16px;border-radius:50%;background:var(--nv2);color:white;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.cron-grupo-lbl{font-size:10px;font-weight:700;color:var(--nv2);margin-bottom:3px;margin-top:2px}

@media(max-width:600px){
  .st3{grid-template-columns:repeat(3,1fr)}
  .enav{grid-template-columns:repeat(2,1fr)}
  .g2{grid-template-columns:1fr}
  .hdr{padding:11px 16px}
  .ct{padding:16px}
}
</style>
</head>
<body>
<div class="wrap" id="root"></div>

<script>
const TPL=[
  {e:0,t:'Mapeamento da sua rotina atual',d:'Durante 3 dias, anote tudo que você faz e o tempo de cada tarefa. Sem filtro, sem julgamento. O objetivo é enxergar onde o tempo está sendo gasto.',p:'O',days:7},
  {e:0,t:'Roda da vida empresarial',d:'Avalie de 0 a 10 cada área: Financeiro, Equipe, Atendimento, Marketing, Processos e Vida Pessoal. Identifique onde está o maior desequilíbrio hoje.',p:'O',days:7},
  {e:0,t:'Missão, visão e valores do negócio',d:'Escreva em 1 frase: o que você faz, para quem e qual transformação gera. Depois liste 3 valores inegociáveis do seu negócio.',p:'R',days:10},
  {e:0,t:'Os 3 maiores desafios hoje',d:'Liste os 3 problemas que mais travam o crescimento agora. Seja honesta e específica. Esses desafios vão guiar toda a jornada.',p:'A',days:5},
  {e:1,t:'Organograma atual e ideal',d:'Desenhe como está hoje: você faz tudo? Tem equipe? Em seguida, desenhe o ideal. Identifique o primeiro papel que você precisa delegar.',p:'O',days:10},
  {e:1,t:'Mapeamento dos processos repetitivos',d:'Liste os 5 processos que você mais repete no negócio. Para cada um: quem faz, como faz e quanto tempo leva. Primeiro passo para delegar.',p:'O',days:12},
  {e:1,t:'Criação de checklists operacionais',d:'Crie um checklist de abertura, fechamento e atendimento ao cliente. O objetivo é que qualquer pessoa consiga seguir sem depender de você.',p:'R',days:15},
  {e:1,t:'Padronização da comunicação',d:'Defina: como você atende no WhatsApp, qual linguagem usa, como responde orçamentos e como faz follow-up com clientes.',p:'A',days:15},
  {e:2,t:'Levantamento completo de custos',d:'Liste todos os custos fixos (mensais, sempre existem) e variáveis (dependem do movimento). Seja detalhada — até os pequenos custos impactam a precificação.',p:'O',days:7},
  {e:2,t:'Fluxo de caixa do mês',d:'Registre todas as entradas e saídas do mês atual. Use a planilha que você recebeu. O objetivo é ter clareza real sobre o dinheiro que entra e sai.',p:'O',days:10},
  {e:2,t:'Precificação correta dos serviços',d:'Aplique a fórmula: custos diretos + custos indiretos + pró-labore desejado + margem de lucro. Revise o preço atual de cada serviço.',p:'R',days:12},
  {e:2,t:'Meta financeira de 90 dias',d:'Com base no custo de vida + custo do negócio + lucro desejado: qual o faturamento mínimo e ideal para os próximos 90 dias? Escreva os dois números.',p:'A',days:12},
  {e:3,t:'Plano de ação de 90 dias',d:'Crie seu plano: 3 metas principais, as ações necessárias para cada uma, responsável e prazo. Uma página. Simples e direto ao ponto.',p:'O',days:7},
  {e:3,t:'Estratégias de aumento de faturamento',d:'Liste 3 ações concretas para aumentar o faturamento: novo serviço, reativação de clientes, parceria, aumento de ticket médio. Escolha 1 para começar essa semana.',p:'R',days:10},
  {e:3,t:'Ritual semanal de revisão',d:'Defina um horário fixo por semana (sugestão: sexta, 30 min) para revisar: O que foi feito? O que ficou? O que precisa ajustar? Esse hábito separa quem cresce de quem trava.',p:'A',days:12},
  {e:3,t:'Indicadores do meu negócio',d:'Defina quais números você vai acompanhar toda semana: faturamento, clientes atendidos, taxa de retorno, ticket médio. Crie o hábito de decidir com base em dados.',p:'A',days:14},
];

const ETS=[
  {n:'Base',nc:'n1',cv:'var(--nv2)',ds:'Autoconhecimento e diagnóstico do negócio'},
  {n:'Estruturação',nc:'n2',cv:'var(--pu)',ds:'Processos, padronização e delegação'},
  {n:'Financeiro',nc:'n3',cv:'var(--go)',ds:'Custos, precificação e metas financeiras'},
  {n:'Plano Estratégico',nc:'n4',cv:'var(--gr)',ds:'Plano de 90 dias e crescimento'},
];

/* ── MODALIDADES ── */
const MODALIDADES={
  completa:{
    label:'Mentoria Completa',
    desc:'Raiz × Resultado · 4 fases · 16 atividades',
    fases:[0,1,2,3],
    temDiag:true,
    icon:'🌱',
    cor:'var(--nv2)',
  },
  processos:{
    label:'Processos e Estrutura',
    desc:'Raiz × Resultado · 2 fases · 8 atividades',
    fases:[0,1],
    temDiag:true,
    icon:'⚙️',
    cor:'var(--pu)',
    ets:['Fase 1 — Raiz','Fase 2 — Estruturação'],
  },
  diagnostico:{
    label:'Diagnóstico R$ 147',
    desc:'Raiz × Resultado · Estruturação + Plano Estratégico',
    fases:[1,3],
    temDiag:true,
    icon:'🔍',
    cor:'var(--go)',
    ets:['Fase 1 — Estruturação','Fase 2 — Plano Estratégico'],
  },
  consultoria_raiz:{
    label:'Consultoria Raiz',
    desc:'Raiz × Resultado · Fase 1 Raiz + Fase 2 Estruturação',
    fases:[0,1],
    temDiag:true,
    icon:'🌿',
    cor:'var(--gr)',
    ets:['Fase 1 — Raiz','Fase 2 — Estruturação'],
  },
};

function getMod(cli){return MODALIDADES[cli.mod||'completa']||MODALIDADES.completa;}
function getFasesVisiveis(cli){return getMod(cli).fases;}
function getNomeFase(cli,eIdx){
  const mod=getMod(cli);
  if(mod.ets){const pos=mod.fases.indexOf(eIdx);if(pos>=0)return mod.ets[pos]||ETS[eIdx].n;}
  return ETS[eIdx].n;
}
const AVCLS=['av0','av1','av2','av3'];
const STM={pending:['bg2','Pendente'],submitted:['bnv','Enviada'],done:['bgr','Concluída']};
const PNM={O:'Organização',R:'Resultado',A:'Ação'};

// ── SUPABASE CONFIG ──

async function sb(path,opts={}){
  const{headers:xh,...rest}=opts;
  const res=await fetch(SUPA_URL+'/rest/v1/'+path,{
    headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,
      'Content-Type':'application/json','Prefer':'return=representation',...(xh||{})},
    ...rest});
  if(res.status===204||res.status===205){return [];}
  if(!res.ok){console.error('SB erro',res.status,await res.text());return null;}
  const t=await res.text();return t?JSON.parse(t):[];
}

async function loadData(){
  try{
    document.getElementById('root').innerHTML='<div style="height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--tx3)"><div style="font-size:32px">🌱</div><div style="font-size:13px">Carregando...</div></div>';
  }catch(e){}
  try{
    const [cls,prs,avs,dgs]=await Promise.all([
      sb('rxr_clients?select=*&order=id'),
      sb('rxr_procs?select=*&order=id'),
      sb('rxr_ativs?select=*&order=id'),
      sb('rxr_diags?select=*&order=id'),
    ]);
    S.clients=cls||[];
    S.procs=(prs||[]).map(p=>({...p,ets:typeof p.ets==='string'?JSON.parse(p.ets):p.ets||[]}));
    S.ativs=avs||[];
    S.diags=(dgs||[]).map(d=>({...d,
      habilidades:typeof d.habilidades==='string'?JSON.parse(d.habilidades||'{}'):d.habilidades||{},
      roda_negocio:typeof d.roda_negocio==='string'?JSON.parse(d.roda_negocio||'{}'):d.roda_negocio||{},
      sentimento:typeof d.sentimento==='string'&&d.sentimento.startsWith('[')?JSON.parse(d.sentimento):d.sentimento,
    }));
    // Mescla planos do localStorage — localStorage sempre tem prioridade sobre Supabase
    function _lsv(v){return(!v||v==='vazio'||v==='false'||v==='null')?null:v;}
    S.diags=S.diags.map(d=>{
      const lsP=_lsv(localStorage.getItem('rxr-plano-'+d.cid));
      const lsC=_lsv(localStorage.getItem('rxr-cron-'+d.cid));
      const lsPL=localStorage.getItem('rxr-plano-lib-'+d.cid)==='true';
      const lsCL=localStorage.getItem('rxr-cron-lib-'+d.cid)==='true';
      return{...d,
        plano_dados:lsP||_lsv(d.plano_dados)||null,
        cron_dados:lsC||_lsv(d.cron_dados)||null,
        plano_liberado:lsPL||d.plano_liberado===true||d.plano_liberado==='true',
        cron_liberado:lsCL||d.cron_liberado===true||d.cron_liberado==='true',
      };
    });
  }catch(e){console.error('loadData erro',e);}
  R();
}

function initJornada(pid,cid,mod){
  const base=new Date();
  const mobj=MODALIDADES[mod||'completa']||MODALIDADES.completa;
  const fases=mobj.fases;
  if(fases.length===0) return; // diagnóstico: sem atividades
  TPL.filter(t=>fases.includes(t.e)).forEach(t=>{
    const pr=new Date(base);pr.setDate(pr.getDate()+t.days);
    S.ativs.push({id:Date.now()+Math.floor(Math.random()*1000),pid,cid,e:t.e,ti:t.t,de:t.d,pi:t.p,pr:pr.toISOString().split('T')[0],st:'pending',res:'',fb:''});
  });
}

  if(code===MENTOR_CODE){S.role='mentor';S.loginErr='';R();return;}
  const cli=S.clients.find(cl=>cl.code&&cl.code.toLowerCase()===code);

  S.loginErr='Código inválido. Verifique com a Vanessa.';R();

function gerarPlanoDados(cli, diag){
  const nome=(diag.nome||cli.n).split(' ')[0];
  const segmento=diag.segmento||'negócio';
  const roda=diag.roda_negocio||{};
  const sentimento=Array.isArray(diag.sentimento)?diag.sentimento:(diag.sentimento?[diag.sentimento]:[]);
  const rodaMap={fin:'Financeiro',eq:'Equipe',at:'Atendimento',mkt:'Marketing',proc:'Processos',vida:'Qualidade de vida'};
  const rodaArr=Object.entries(rodaMap).map(([k,l])=>({k,l,v:parseInt(roda[k])||0})).sort((a,b)=>a.v-b.v);
  const forca=rodaArr[rodaArr.length-1];

  // Usa DOR DECLARADA — mudanca_90 (objetivo explícito) tem prioridade máxima
  const goal=(diag.mudanca_90||'').toLowerCase();
  const txt=((diag.motivo||'')+(diag.livre||'')+(diag.maior_desafio||'')+(diag.desafios||'')).toLowerCase();

  // 1º — objetivo declarado tem prioridade
  let foco='proc';
  if(/process|fluxo|estrutur|organiz|padroniz|funil|etapas|document|checklist/.test(goal)){
    foco='proc'; // processo mencionado explicitamente como objetivo → sempre processo
  } else if(/\btempo\b|urgên|agenda|rotina|blocos/.test(goal)){
    foco='tempo';
  } else if(/financ|custo|preç|lucro|faturamento/.test(goal)){
    foco='fin';
  } else if(/cliente|marketing|venda|atração|captar|prospec/.test(goal)){
    foco='mkt';
  } else if(/equipe|delegar|funcionário/.test(goal)){
    foco='eq';
  } else {
    // 2º — texto secundário (motivo, desafios)
    if(/\btempo\b|urgên|agenda|rotina/.test(txt)) foco='tempo';
    else if(/financ|custo|preç|lucro/.test(txt)) foco='fin';
    else if(/cliente|marketing|venda|atração/.test(txt)) foco='mkt';
    else if(/equipe|delegar|funcionário/.test(txt)) foco='eq';
    else {
      // 3º — fallback: score mais baixo com nota ≤3
      const maisfraco=rodaArr[0];
      if(maisfraco.v<=3) foco=maisfraco.k;
    }
  }

  // RAIZ — baseada no foco e no sentimento
  let raiz='';
  if(foco==='proc'){
    raiz=`${nome}, você tem um processo que funciona — mas ainda depende muito de você, do improviso e da memória. O problema não é o que você entrega: é que tudo está na sua cabeça. Os próximos 30 dias transformam isso em sistema.`;
  } else if(foco==='tempo'){
    if(sentimento.some(s=>s.includes('sobrecarregada')||s.includes('tudo sozinha')))
      raiz=`${nome}, você está carregando o negócio sozinha — e o tempo nunca é suficiente. O foco dos próximos 30 dias é estruturar a semana e criar processos que protejam o seu tempo.`;
    else
      raiz=`${nome}, o seu tempo é o recurso mais escasso do negócio. Os próximos 30 dias são sobre organizar a semana para que o operacional pare de engolir o estratégico.`;
  } else if(foco==='fin'){
    raiz=`${nome}, sem saber o custo real, crescer é um risco. O foco dos próximos 30 dias é ter clareza financeira completa — custo, preço e meta de faturamento.`;
  } else if(foco==='mkt'){
    raiz=`${nome}, o negócio não pode depender só de indicação. Os próximos 30 dias são sobre criar um fluxo consistente de clientes novos chegando.`;
  } else {
    raiz=`${nome}, o negócio precisa funcionar sem depender só de você. Os próximos 30 dias são sobre documentar, ensinar e começar a delegar.`;
  }

  // CARDS
  const dor=foco==='tempo'?'Gestão do tempo — urgências e operacional dominam a agenda.':
            foco==='fin'?'Clareza financeira — sem saber o custo real, crescer é arriscado.':
            foco==='mkt'?'Atração de clientes — o negócio depende de indicação ou de você se esforçar mais.':
            foco==='eq'?'Dependência total de você — sem delegação, o crescimento tem teto.':
            'Processo fragmentado — tudo na cabeça, sem padronização.';
  const gargalo=forca&&forca.v>=6?`${forca.l} já funciona bem (${forca.v}/10) — construir em cima disso.`
    :'Ausência de estrutura documentada — retrabalho constante.';
  const op=diag.mudanca_90?`"${diag.mudanca_90.slice(0,55).trim()}..." — objetivo declarado.`
    :'30 dias de estrutura = base para crescer de forma sustentável.';

  // ALERTA
  let alerta=`${nome}, o primeiro passo é o mais importante. Não precisa ser perfeito — precisa ser feito. Comece pela Semana 1 ainda essa semana.`;
  if(diag.crenca&&diag.crenca.length>5)
    alerta=`${nome}, você identificou: "${diag.crenca.slice(0,70)}..." — esse é o trabalho da raiz. As ferramentas funcionam quando a mentalidade já mudou.`;

  // FASE 1: sempre Mapear
  const f1={num:'01',cor:'nv',titulo:`Base · Mapear ${foco==='tempo'?'onde o tempo vai':foco==='fin'?'os números reais':'o processo atual'}`,prazo:'Semana 1',
    raiz:`Antes de criar qualquer coisa nova, você precisa ver com clareza o que existe hoje. Um diagnóstico honesto que vai guiar tudo.`,
    acoes:foco==='tempo'?[
      {t:'Registre tudo que você faz durante 3 dias',passos:[
        'Para cada atividade: O QUE FIZ / QUANTO TEMPO / foi prospecção ou operacional?',
        'Para cada interrupção: quem mandou / o que era / era urgente de verdade?',
        'Some as horas de cada tipo — esse número vai te surpreender',
      ]},
      {t:'Identifique o que só você pode fazer vs. o que pode ser padronizado',passos:[
        'Para cada atividade: 🔴 depende do meu julgamento / 🟡 posso documentar / 🟢 pode automatizar',
        'Guarde a lista de itens 🟡 — eles são o ponto de partida da Semana 2',
      ]},
    ]:foco==='fin'?[
      {t:'Liste todos os custos do negócio',passos:[
        'Duas colunas: FIXOS (sempre existem) e VARIÁVEIS (dependem do movimento)',
        'Some os dois totais — esse é o custo mínimo do negócio por mês',
      ]},
      {t:'Calcule o custo real por produto ou serviço',passos:[
        'Custo direto + parte dos fixos rateada + valor do seu tempo (pró-labore ÷ horas disponíveis)',
        'Esse número é o piso — o preço não pode ser menor que isso',
      ]},
    ]:[
      {t:'Documente as etapas do seu processo atual',passos:[
        'Escreva as etapas em sequência — do primeiro contato até o pós-venda',
        'Para cada etapa: o que você faz, o que fala, onde registra hoje',
        'Marque onde você mais perde tempo ou precisa voltar ao cliente — esse é o gargalo',
      ]},
      {t:'Identifique o que pode ser padronizado',passos:[
        'Para cada atividade: 🔴 depende de mim / 🟡 posso documentar / 🟢 pode automatizar',
        'Guarde a lista de itens 🟡 — eles guiam a Semana 2',
      ]},
    ]};

  // FASE 2: sempre Estruturar
  const f2={num:'02',cor:'pu',titulo:'Estruturação · Criar as ferramentas',prazo:'Semana 2',
    raiz:`Com o diagnóstico pronto, você cria as ferramentas que eliminam o improviso e o retrabalho.`,
    acoes:foco==='tempo'?[
      {t:'Crie os blocos fixos da semana e o protocolo de urgências',passos:[
        'Blocos fixos: defina dias para prospecção / atendimento / operacional — sem misturar',
        'Protocolo de urgências: classifique cada demanda como AGORA / HOJE / PODE ESPERAR antes de responder',
        'Comunique aos clientes ativos qual é o seu horário de suporte dedicado',
      ]},
      {t:'Padronize os processos que mais repetem',passos:[
        'Para cada processo 🟡 da Semana 1: escreva o passo a passo como se fosse ensinar alguém do zero',
        'Crie mensagens ou templates para as comunicações mais repetidas',
      ]},
    ]:foco==='fin'?[
      {t:'Revise a precificação com base no custo real',passos:[
        'Compare o preço atual com o custo real calculado — está cobrindo custo + pró-labore + margem de 30%?',
        'Para produtos abaixo do custo: defina quando e quanto reajustar',
        'Comunique o reajuste com antecedência — clientes aceitam melhor quando preparados',
      ]},
      {t:'Crie o controle semanal de faturamento',passos:[
        'Planilha simples: Semana / Receita / Meta / Diferença',
        'Defina a meta mínima (pagar as contas) e a meta ideal (crescer)',
        'Preencha todo domingo — 5 minutos que mudam a consciência financeira',
      ]},
    ]:[
      {t:'Crie os templates de comunicação para cada etapa',passos:[
        'Abra as mensagens que já usa e transforme em templates com espaços para personalizar',
        'Um template por etapa — com [nome] e outros campos variáveis',
        'Salve em um único documento acessível do celular',
      ]},
      {t:'Crie o roteiro e checklist de cada etapa',passos:[
        'Roteiro: o que perguntar e colher em cada etapa antes de avançar',
        'Checklist: os documentos ou informações obrigatórias por tipo de cliente',
        'Teste: outra pessoa consegue executar sem você explicar? Se sim: está pronto',
      ]},
    ]};

  // FASE 3: sempre Testar
  const f3={num:'03',cor:'go',titulo:'Prática · Testar na semana',prazo:'Semana 3',
    raiz:`O que foi criado só tem valor quando usado. Essa semana inteira é de teste real em situações reais.`,
    acoes:[
      {t:`Use ${foco==='tempo'?'os blocos fixos e o protocolo':foco==='fin'?'o controle financeiro e os preços ajustados':'o processo documentado'} em todos os atendimentos`,passos:[
        `Antes de cada ${foco==='tempo'?'ação':'contato'}: abra ${foco==='tempo'?'a agenda e respeite o bloco':'o template ou roteiro da etapa'}`,
        'Anote cada vez que saiu do planejado e o motivo',
        'Sexta-feira: liste os 3 ajustes prioritários para a Semana 4',
      ]},
    ]};

  // FASE 4: sempre Consolidar
  const f4={num:'04',cor:'gr',titulo:'Consolidação · Ajustar e criar o ritual',prazo:'Semana 4',
    raiz:`Você refina o que testou e cria o hábito que vai manter a estrutura funcionando.`,
    acoes:[
      {t:'Implemente os ajustes e reúna tudo em um único lugar',passos:[
        'Corrija o que não funcionou na prática',
        'Um documento só: todas as ferramentas criadas em ordem de uso',
      ]},
      {t:'Crie o ritual semanal de revisão',passos:[
        'Segunda-feira, 30 minutos, antes de abrir o WhatsApp',
        `Olhe 3 números: ${foco==='fin'?'receita / custo / margem':foco==='tempo'?'horas comerciais / horas operacional / meta':'contatos / propostas / fechamentos'}`,
        'Pergunta fixa: o que travou essa semana? O que não pode se repetir?',
      ]},
    ]};

  return{nome,segmento,negocio:diag.negocio||segmento,raiz,dor,gargalo,oportunidade:op,
    fases:[f1,f2,f3,f4],alerta,data:new Date().toLocaleDateString('pt-BR')};
}

// Gera cronograma: 1 item por AÇÃO do plano, distribuído por dia da semana
function gerarCronDoPlano(plano){
  const DIAS=['Segunda','Terça','Quarta','Quinta','Sexta'];

  return (plano.fases||[]).map((fase,fi)=>{
    const cor=fase.cor||'nv';
    const faseTit=(fase.titulo||'').split(' · ');
    const acoes=fase.acoes||[];
    const itens=[];
    let diaIdx=0;

    acoes.forEach((acao,ai)=>{
      const dia=DIAS[Math.min(diaIdx,4)];

      // Como fazer: usa personalizado do plano se existir
      // Se não, usa os próprios passos da ação como instruções
      // Se não tiver passos, usa keyword matching
      let cf=null;
      if(acao.comoFazer){
        cf=acao.comoFazer;
      } else if(acao.passos&&acao.passos.length>0){
        cf={titulo:'Como fazer',passos:acao.passos};
      } else if(acao.d){
        cf=gerarComoFazer(acao.t,fase.titulo)||{titulo:'Como fazer',passos:[acao.d]};
      } else {
        cf=gerarComoFazer(acao.t,fase.titulo);
      }

      itens.push({
        id:fi*1000+ai,
        dia,
        txt:acao.t,          // título da ação — o que fazer
        grupo:faseTit[1]||fase.titulo,
        comoFazer:cf,        // como fazer — instruções específicas
        expandido:false,
        done:false,
        nota:'',
      });

      // Avança 1 dia por ação
      diaIdx=Math.min(diaIdx+1,4);
    });

    return{
      id:fi,
      sem:(fase.prazo||'').replace('Semanas ','').replace('Semana ','').replace('Dias ',''),
      fase:faseTit[0]||('Fase '+(fi+1)),
      desc:faseTit[1]||'',
      cor,aberto:fi===0,itens,
    };
  });
}

function bCronBloco(b,cid,isMentor){
  const total=b.itens.length;
  const feitos=b.itens.filter(i=>i.done).length;
  const pct=total?Math.round(feitos/total*100):0;
  const cor=COR_MAP[b.cor]||'var(--nv2)';
  const bgCor=BG_MAP[b.cor]||'var(--nvf)';

  // Agrupar itens por dia da semana
  const DIAS=['Segunda','Terça','Quarta','Quinta','Sexta'];
  const porDia={};
  b.itens.forEach(item=>{
    const dia=item.dia||'Segunda';
    if(!porDia[dia])porDia[dia]=[];
    porDia[dia].push(item);
  });
  // Dias que têm itens, na ordem certa
  const diasComItens=DIAS.filter(d=>porDia[d]&&porDia[d].length>0);
  // Se não tem dias definidos, agrupa tudo sem dia
  const semDia=b.itens.filter(i=>!i.dia);

  const renderItem=(item)=>`
    <div class="cron-item">
      <div class="cron-check ${item.done?'done':''}" onclick="toggleCronItem(${cid},${b.id},${item.id})">
        ${item.done?`<svg width="10" height="10" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`:''}
      </div>
      <div style="flex:1">
        ${item.grupo&&!isMentor?`<div class="cron-grupo-lbl">${item.grupo}</div>`:''}
        <div class="cron-txt ${item.done?'done':''}">${item.txt}</div>
        ${item.comoFazer?`
          <button class="como-fazer-btn" onclick="toggleComoFazer(${cid},${b.id},${item.id})">
            ${item.expandido?'▲ Fechar':'▶ Como fazer'}
          </button>
          ${item.expandido?`<div class="como-fazer-box">
            <div style="font-size:10px;font-weight:700;color:var(--nv2);margin-bottom:8px">${item.comoFazer.titulo}</div>
            ${item.comoFazer.passos.map((p,pi)=>`
              <div class="como-fazer-passo">
                <div class="cf-num">${pi+1}</div>
                <div>${p}</div>
              </div>
            `).join('')}
          </div>`:''}
        `:''}
        ${item.nota?`<div class="cron-nota">📝 ${item.nota}</div>`:''}
        ${!isMentor&&!item.done?`<input type="text" placeholder="Adicionar nota..." value="${item.nota||''}"
          style="margin-top:5px;font-size:11px;padding:4px 8px;border-radius:5px;width:100%"
          onblur="salvarNotaCron(${cid},${b.id},${item.id},this.value)"
          onkeydown="if(event.key==='Enter')this.blur()"/>`:``}
      </div>
    </div>`;

  return`<div class="cron-semana">
    <div class="cron-hdr" onclick="toggleCronBloco(${cid},${b.id})">
      <div class="cron-num" style="background:${bgCor};color:${cor}">${b.sem.replace('–','-')}</div>
      <div style="flex:1">
        <div class="cron-titulo">${b.fase} <span style="font-weight:400;color:var(--tx3)">· ${b.desc}</span></div>
        <div class="cron-pbar" style="width:120px"><div class="cron-pfill" style="width:${pct}%;background:${cor}"></div></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <span style="font-size:11px;font-weight:700;color:${cor}">${feitos}/${total}</span>
        <span style="font-size:14px;color:var(--tx3)">${b.aberto?'▲':'▼'}</span>
      </div>
    </div>
    ${b.aberto?`<div class="cron-body">
      ${diasComItens.length>0
        ? diasComItens.map(dia=>`
          <div class="cron-dia-hdr">
            <div class="cron-dia-dot" style="background:${cor}"></div>
            ${dia}
          </div>
          ${porDia[dia].map(item=>renderItem(item)).join('')}
        `).join('')
        : semDia.map(item=>renderItem(item)).join('')
      }
    </div>`:''}
  </div>`;
}

function bCronCli(){
  const cli=S.clients[S.curCli];
  if(!cli)return`<div class="ct"></div>`;
  const diag=S.diags.find(d=>d.cid===cli.id);
  function _lv(v){return(!v||v==='vazio'||v==='false'||v==='null')?null:v;}
  const cronStr=_lv(diag?.cron_dados)||_lv(localStorage.getItem('rxr-cron-'+cli.id));
  const liberado=(diag?.cron_liberado===true||diag?.cron_liberado==='true')||localStorage.getItem('rxr-cron-lib-'+cli.id)==='true';
  if(!liberado||!cronStr)return`<div class="ct"><div style="text-align:center;padding:48px 20px">
    <div style="font-size:32px;margin-bottom:10px">📅</div>
    <div style="font-size:14px;font-weight:700;margin-bottom:6px;color:var(--nv2)">Seu cronograma está sendo preparado</div>
    <div style="font-size:12px;color:var(--tx3);max-width:280px;margin:0 auto;line-height:1.6">A Vanessa vai liberar em breve. Fique de olho!</div>
  </div></div>`;
  const cron=JSON.parse(cronStr);
  const total=cron.reduce((s,b)=>s+b.itens.length,0);
  const feitos=cron.reduce((s,b)=>s+b.itens.filter(i=>i.done).length,0);
  const pct=total?Math.round(feitos/total*100):0;
  return`<div class="ct">
    <div class="row" style="gap:12px;margin-bottom:16px">
      <div class="av ${avc(cli.id)}" style="width:44px;height:44px;font-size:14px">${cli.ini}</div>
      <div>
        <div style="font-size:15px;font-weight:800">${cli.n}</div>
        <div style="font-size:11px;color:var(--tx3)">Cronograma · 10 semanas · Raiz × Resultado</div>
      </div>
    </div>
    <div style="margin-bottom:14px">
      <div class="rwb" style="margin-bottom:5px">
        <span style="font-size:11px;color:var(--tx3)">Progresso geral · ${feitos} de ${total} ações</span>
        <span style="font-size:13px;font-weight:800;color:var(--gr)">${pct}%</span>
      </div>
      <div class="pb" style="height:7px"><div class="pf" style="width:${pct}%;background:var(--gr)"></div></div>
    </div>
    <div style="background:var(--grf);border-radius:var(--rs);padding:10px 13px;font-size:12px;color:var(--gr);margin-bottom:14px;line-height:1.5">
      ✅ Marque cada ação conforme você for realizando. Você pode adicionar uma nota em cada item.
    </div>
    ${cron.map(b=>bCronBloco(b,cli.id,false)).join('')}
  </div>`;}
